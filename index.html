<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>airbnb-clone</title>
    <link rel = "stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
    <div class="nav-box">

            <div class="airbnb-logo"></div>
            <div class="nav-options">
                <i class="fa-solid fa-house-user service-logo"></i>
                <p>Homes</p>
                <i class="fa-solid fa-parachute-box service-logo"></i>
                <p>Experiences</p>
                <i class="fa-solid fa-bell-concierge service-logo"></i>
                <p>Services</p>
            </div>
            <div class="location-logos">
                Become a host
                <div class="circle">
                    <i class="fa-solid fa-globe"></i>
                </div>
                <div class="circle">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>
        </div>

        <div class="nav-bottom">
            <div class="nav-bottom-content">
                <div class="nav-bottom-top1 space-around bottom-border">Where <p>Search destinations</p></div>
                <div class="nav-bottom-top2 space-around bottom-border">When <p>Add dates</p></div>
                <div class="nav-bottom-top3 space-around">Who <p>Add guests</p>
                    <i class="fa-solid fa-magnifying-glass circle"></i>
            </div>
            </div>
        </div>
