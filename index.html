<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>airbnb-clone</title>
    <link rel = "stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="nav-box">
        <div class="nav-top">
            <div class="airbnb-logo"></div>
            <div class="nav-options">
                <i class="fa-solid fa-house-user service-logo"></i>
                <p>Homes</p>
                <i class="fa-solid fa-parachute-box service-logo"></i>
                <p>Experiences</p>
                <i class="fa-solid fa-bell-concierge service-logo"></i>
                <p>Services</p>
            </div>
            <div class="location-logos">
                Become a host
                <div class="circle">
                    <i class="fa-solid fa-globe"></i>
                </div>
                <div class="circle">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>
        </div>

        <div class="nav-bottom">
            <div class="nav-bottom-content">
                <div class="item">
                    <div class="title">Where</div>
                    <div class="title-child">Search destinations</div>
                </div>
                <div class="item">
                    <div class="title">When</div>
                    <div class="title-child">Add dates</div>
                </div>
                <div class="item">
                    <div class="title">Who</div>
                    <div class="title-child">Add guests</div>
                </div>
                <div class="search-circle">
                     <i class="fa-solid fa-magnifying-glass "></i>
                </div>
            </div>
            </div>
        </div>
    </div>

    <div class="main-part">
        <div class="first-section">
            <div class="title-icon">
                <div class = "main-titles">Popular Homes in Kuala Lumpur</div>
                <div class="right-icon">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </div>
            <div class="first-picture-section">
                <div class="first-pic" style = "background-image : url('hotel_room1.jpg');">
                    <div class="first-picture-write">
                        <div class="pic-title">
                            <p>Guest favorite</p>
                        </div>
                        <div class="love-icon">
                            <i class="fa-regular fa-heart"></i>
                        </div>
                    </div>
                </div>
                <div class="tags">
                    <h5>Room in Kuala Lumpur</h5>
                    <div class="p-tags">
                        <p>$51 for 2 nights</p>
                    </div>
                </div>
            </div>
    </div>
    
</body>
</html>
